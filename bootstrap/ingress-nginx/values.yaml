controller:
  service:
    type: LoadBalancer
  watchIngressWithoutClass: true
  ingressClassResource:
    default: true
  admissionWebhooks:
    enabled: false
  config:
    proxy-body-size: "1024m"
    allow-snippet-annotations: "true"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
