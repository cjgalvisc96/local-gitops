# =========================
# GITEA HELM CONFIG (LOCAL LAB)
# =========================

replicaCount: 1

service:
  http:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false  # IMPORTANT: we manage ingress ourselves via Kustomize

gitea:
  admin:
    username: admin
    password: adminadmin1
    email: admin@local.dev

  config:
    server:
      DOMAIN: gitea.dev.local
      ROOT_URL: http://gitea.dev.local/

persistence:
  enabled: false

postgresql:
  enabled: true
  auth:
    postgresPassword: giteaadmin
    username: gitea
    password: giteaadmin
    database: gitea

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Avoid race conditions in local environments
waitForDB: true