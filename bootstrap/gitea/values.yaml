replicaCount: 1

service:
  http:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false

gitea:
  admin:
    username: adminlocal
    password: adminlocal1
    email: admin@gitops.local
  config:
    server:
      DOMAIN: gitea.dev.local
      ROOT_URL: http://gitea.dev.local/
    database:
      DB_TYPE: sqlite3
    service:
      DISABLE_REGISTRATION: true
    webhook:
      ALLOWED_HOST_LIST: "*"
    actions:
      ENABLED: true

persistence:
  enabled: false

# Chart 12.x bundles HA Postgres + Valkey ON by default; keep them OFF — this
# lab Gitea uses ephemeral sqlite + no cache (single replica). (Chart 12 renamed
# the cache subcharts redis-cluster/redis -> valkey-cluster/valkey.)
postgresql-ha:
  enabled: false
postgresql:
  enabled: false
valkey-cluster:
  enabled: false
valkey:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
