# =========================
# GITEA HELM CONFIG (management cluster)
# =========================
replicaCount: 1

# Internal git protocol over HTTP is enough for a local lab.
service:
  http:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false   # we manage ingress ourselves (bootstrap/gitea/ingress.yaml)

gitea:
  admin:
    # 'admin' is a reserved username in Gitea — use a non-reserved name.
    username: gitea_admin
    password: adminadmin1
    email: admin@gitops.local
  config:
    server:
      DOMAIN: gitea.dev.local
      ROOT_URL: http://gitea.dev.local/
      # Argo CD clones over the in-cluster service DNS, not the ingress host.
    database:
      DB_TYPE: sqlite3        # built-in DB: no subchart, no extra image, fast
    service:
      DISABLE_REGISTRATION: true
    webhook:
      ALLOWED_HOST_LIST: "*"   # let Gitea webhooks reach Argo CD if wired later

# Keep the lab disposable: no PVCs, in-memory friendly.
persistence:
  enabled: false

# Disable all bundled datastores. The Bitnami PostgreSQL/Redis images were pulled
# from Docker Hub's public catalog in 2025 (ImagePullBackOff), and SQLite is
# plenty for a single-replica local lab.
postgresql-ha:
  enabled: false
postgresql:
  enabled: false
redis-cluster:
  enabled: false
redis:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
