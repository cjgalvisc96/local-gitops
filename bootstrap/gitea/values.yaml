replicaCount: 1

service:
  http:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false

gitea:
  admin:
    username: adminlocal
    password: adminlocal1
    email: admin@gitops.local
  config:
    server:
      DOMAIN: gitea.dev.local
      ROOT_URL: http://gitea.dev.local/
    database:
      DB_TYPE: sqlite3
    service:
      DISABLE_REGISTRATION: true
    webhook:
      ALLOWED_HOST_LIST: "*"
    actions:
      ENABLED: true

persistence:
  enabled: false

postgresql-ha:
  enabled: false
postgresql:
  enabled: false
redis-cluster:
  enabled: false
redis:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
