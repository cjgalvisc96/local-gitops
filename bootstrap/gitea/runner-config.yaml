log:
  level: info

runner:
  capacity: 1
  timeout: 1h
  labels:
    - "lab:docker://catthehacker/ubuntu:act-22.04"

cache:
  enabled: false

container:
  network: host
  docker_host: "-"
  # act_runner 0.2.11 has no automount, so bind-mount the docker socket into every job or docker steps fail.
  # install.sh substitutes __LOCAL_GITOPS_DIR__ with the repo's host path before mounting this config.
  options: "-v /var/run/docker.sock:/var/run/docker.sock -v __LOCAL_GITOPS_DIR__:/opt/local-gitops:ro"
  valid_volumes:
    - "**"
