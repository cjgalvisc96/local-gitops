# App-of-apps root for the dev cluster's Argo CD. Applied by install.sh to the
# dev cluster. Watches platform-config/envs/dev and deploys that env's stack
# (ESO, platform, dependencies, observability, todo-app) into THIS cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: http://172.18.255.209:3000/gitops/platform-config.git
    targetRevision: HEAD
    path: envs/dev
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
