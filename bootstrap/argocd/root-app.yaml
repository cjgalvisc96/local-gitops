# App-of-apps root. Applied directly by install.sh (step 9) to bootstrap GitOps.
# From here on, everything is driven by Git: this Application watches the
# platform-config repo and applies the AppProjects + ApplicationSets it finds,
# which in turn fan applications/observability out to the dev & prod clusters.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitops/platform-config.git
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc   # the management cluster itself
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
