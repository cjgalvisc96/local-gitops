apiVersion: v1
kind: Namespace
metadata:
  name: dev-app
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-admin
  namespace: dev-app
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prod-readonly
  namespace: prod-app
rules:
  - apiGroups: ["*"]
    resources: ["pods","services"]
    verbs: ["get","list","watch"]