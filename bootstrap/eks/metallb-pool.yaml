# MetalLB single-IP pool + L2 advertisement for a floci-EKS cluster.
# __EKS_LB_IP__ is rendered per env by `task eks:bootstrap-net` (dev .230 / prod .240).
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: floci-eks
  namespace: metallb-system
spec:
  addresses:
    - __EKS_LB_IP__/32
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: floci-eks
  namespace: metallb-system
spec:
  ipAddressPools:
    - floci-eks
