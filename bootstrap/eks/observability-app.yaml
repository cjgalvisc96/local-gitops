apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-__ENV__
  namespace: argocd
spec:
  project: __ENV__
  source:
    repoURL: __GITEA_REPO_URL__
    targetRevision: HEAD
    path: observability/overlays/__ENV__
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
