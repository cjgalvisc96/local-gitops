# Permissive Argo AppProjects — governance lives with the platform. App
# Applications reference project: dev / prod. Applied to every floci-EKS cluster
# (static; no per-env rendering).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev
  namespace: argocd
spec:
  sourceRepos: ["*"]
  destinations:
    - { server: "*", namespace: "*" }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
spec:
  sourceRepos: ["*"]
  destinations:
    - { server: "*", namespace: "*" }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
