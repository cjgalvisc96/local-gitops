# Argo CD UI ingress — plain HTTP, served by the cluster's ingress-nginx.
# __ENV__ is rendered per env by `task eks:install-argo` (argo.dev/prod.local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: argo.__ENV__.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
