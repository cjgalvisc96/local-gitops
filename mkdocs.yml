site_name: GitOps Enterprise Lab
site_description: >-
  A fully local, reproducible multi-cluster GitOps platform — three kind
  clusters managed from Git, with per-cluster Argo CD, observability and secrets.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Launch: launch.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Guides:
      - GitOps Workflow: workflow.md
      - CI/CD (Gitea Actions): cicd.md
      - Observability: observability.md
      - Networking & DNS: networking.md
      - Secrets: secrets.md
  - Reference:
      - Repository Layout: repository.md
      - Operations: operations.md
