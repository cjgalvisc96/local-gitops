# Postgres + Redis for the todo-app (its chart expects DB_HOST=postgres / REDIS_HOST=redis).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dependencies-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: dev
  source:
    repoURL: http://172.18.255.209:3000/gitops/gitops-apps.git
    targetRevision: HEAD
    path: dependencies/base
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-app
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
