# Namespaces, ConfigMap, RBAC, and the floci-backed ClusterSecretStore.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: dev
  source:
    repoURL: http://172.18.255.209:3000/gitops/gitops-apps.git
    targetRevision: HEAD
    path: platform/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    # The ClusterSecretStore is validated by the External Secrets webhook, which
    # may not be serving yet when this app first syncs (it's installed by the
    # external-secrets app at sync-wave -1). Retry with backoff so the apply
    # self-heals once the webhook endpoint is up instead of staying OutOfSync.
    retry:
      limit: 10
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
