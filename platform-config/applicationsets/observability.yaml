# OpenTelemetry Collector + Prometheus + Grafana, one stack per environment.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: environment
              operator: In
              values: [dev, prod]
  template:
    metadata:
      name: "observability-{{.name}}"
      labels:
        gitops.local/env: "{{.name}}"
    spec:
      project: "{{.name}}"
      source:
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitops/gitops-apps.git
        targetRevision: HEAD
        path: "observability/overlays/{{.name}}"
      destination:
        name: "{{.name}}"
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
