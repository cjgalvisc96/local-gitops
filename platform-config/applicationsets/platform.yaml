# Per-environment platform layer: isolated namespaces, shared ConfigMap,
# RBAC, and the external-secrets ClusterSecretStore wired to floci (AWS SSM).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: environment
              operator: In
              values: [dev, prod]
  template:
    metadata:
      name: "platform-{{.name}}"
      labels:
        gitops.local/env: "{{.name}}"
    spec:
      project: "{{.name}}"
      source:
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitops/gitops-apps.git
        targetRevision: HEAD
        path: "platform/overlays/{{.name}}"
      destination:
        name: "{{.name}}"
        namespace: platform-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
