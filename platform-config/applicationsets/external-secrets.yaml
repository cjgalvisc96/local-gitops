# External Secrets Operator (ESO) on each workload cluster. Provides the
# SecretStore/ExternalSecret CRDs used by the platform layer to pull secrets
# from AWS SSM Parameter Store — emulated locally by floci.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: environment
              operator: In
              values: [dev, prod]
  template:
    metadata:
      name: "external-secrets-{{.name}}"
      labels:
        gitops.local/env: "{{.name}}"
    spec:
      project: "{{.name}}"
      sources:
        - repoURL: https://charts.external-secrets.io
          chart: external-secrets
          # v2.x honors AWS_ENDPOINT_URL so the AWS provider routes to floci.
          targetRevision: 2.6.0
          helm:
            releaseName: external-secrets
            valuesObject:
              installCRDs: true
              # Point the AWS SDK at floci. Pods reach the host-published floci
              # port via the kind bridge gateway (172.18.0.1).
              extraEnv:
                - name: AWS_ENDPOINT_URL
                  value: http://172.18.0.1:4566
                - name: AWS_REGION
                  value: us-east-1
      destination:
        name: "{{.name}}"
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
