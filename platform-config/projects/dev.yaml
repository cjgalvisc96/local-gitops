apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dev
  namespace: argocd
spec:
  description: Workloads and observability for the DEV cluster.
  sourceRepos:
    - http://gitea-http.gitea.svc.cluster.local:3000/gitops/gitops-apps.git
    - https://charts.external-secrets.io
  destinations:
    - name: dev
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
