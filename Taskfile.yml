version: '3'

vars:
  # KIND = management only (Gitea). Argo CD + app + observability run on EKS.
  CLUSTERS: management
  ENV: '{{.ENV | default "dev"}}'
  MKDOCS: uvx --with mkdocs-material==9.7.6 --from mkdocs==1.6.1 mkdocs
  # Gitea coordinates (match lib/common.sh) — the in-cluster Git LB the EKS Argo
  # pulls gitops-apps (observability) from.
  GITEA_INCLUSTER_URL: '{{.GITEA_INCLUSTER_URL | default "http://172.18.255.209:3000"}}'
  GITEA_ORG: '{{.GITEA_ORG | default "gitops"}}'
  GITEA_ADMIN_USER: '{{.GITEA_ADMIN_USER | default "adminlocal"}}'
  GITEA_ADMIN_PASSWORD: '{{.GITEA_ADMIN_PASSWORD | default "adminlocal1"}}'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  tools:
    desc: Install the pinned CLI toolchain via mise (mise.toml)
    cmds:
      - mise install
      - mise reshim

  # Build the lab in two layers:
  #   INFRA (Terraform/Terragrunt): the floci container + the kind management
  #     cluster + the Gitea Actions runner container.
  #   KUBERNETES (declarative helm/kubectl, ./install.sh): MetalLB, ingress-nginx,
  #     Gitea, its ingress/LB + the gitops-apps seed, DNS.
  # The runner needs a token from the running Gitea, so it is created on a SECOND
  # Terragrunt apply after the Kubernetes layer is up.
  install:
    desc: 'Build the full lab — Terraform infra (floci + kind + floci-EKS) + the Kubernetes layer (helm/kubectl) + Gitea runner + the per-EKS GitOps stack (Argo + observability)'
    cmds:
      # 1) INFRA (Terragrunt): floci container + kind management cluster +
      #    the floci-EKS (k3s) workload clusters (dev + prod).
      - bash -c 'cd "$(git rev-parse --show-toplevel)/infra/terragrunt/lab" && terragrunt apply -auto-approve -input=false'
      - kind export kubeconfig --name management
      # 2) KUBERNETES layer (declarative helm/kubectl) + Gitea seed.
      - ./install.sh
      # 3) RUNNER (Terraform): fetch a Gitea token, then a second apply creates it.
      - |
        set -e
        root="$(git rev-parse --show-toplevel)"
        pod=$(kubectl --context kind-management -n gitea get pod -l app.kubernetes.io/name=gitea -o jsonpath='{.items[0].metadata.name}')
        token=$(kubectl --context kind-management -n gitea exec "$pod" -c gitea -- gitea actions generate-runner-token | tr -d '\r\n')
        ( cd "$root/infra/terragrunt/lab" && TF_VAR_runner_token="$token" terragrunt apply -auto-approve -input=false )
        echo "✅ infra ready — Gitea Actions runner provisioned"
      # 4) Per-EKS GitOps stack: MetalLB + ingress-nginx + Argo CD + observability
      #    INTO each floci-EKS cluster, so argo.<env>.local + grafana.<env>.local
      #    work standalone — before any app deploys. No APP_DIR = no app yet.
      - for: [dev, prod]
        task: eks:bootstrap
        vars: { ENV: "{{.ITEM}}" }
      # 5) Final banner — printed only now, after EVERYTHING is up.
      - |
        cat <<'EOF'

        ==================================================================
          🚀  GitOps Enterprise Lab is UP
        ==================================================================
          management plane (kind):
            Gitea     http://gitea.dev.local
          workload plane (floci-EKS) — live now, before any app:
            Argo CD   http://argo.dev.local   |  http://argo.prod.local   (admin / task eks:argo-password ENV=dev)
            Grafana   http://grafana.dev.local |  http://grafana.prod.local
        ------------------------------------------------------------------
          Deploy an app onto it (from the app repo):
            task gitea:create-repo && task gitea:ship
        ==================================================================
        EOF

  gitea:ship:
    desc: Re-push gitops-apps (observability) to Gitea so the in-EKS Argo reconciles your changes — no reinstall. Needs the lab running.
    cmds:
      - SYNC_ONLY=true ./install.sh

  # Tear down both layers: Terragrunt destroys the runner + kind cluster + floci;
  # prune.sh mops up host state (DNS block, kube contexts, floci helper containers).
  prune:
    desc: 'Tear down the lab — Terragrunt destroy (runner + kind + floci) then host cleanup'
    cmds:
      - cmd: bash -c 'cd "$(git rev-parse --show-toplevel)/infra/terragrunt/lab" && terragrunt destroy -auto-approve -input=false || true'
      - cmd: ./prune.sh

  prune:all:
    desc: Tear down everything AND uninstall the mise-managed CLI tools
    cmds:
      - ./prune.sh --tools

  validate:
    desc: Render every overlay, parse YAML and lint the shell scripts
    cmds:
      - task: validate:kustomize
      - task: validate:scripts

  validate:kustomize:
    desc: kustomize build every overlay (must render cleanly)
    cmds:
      - for: { var: KUSTOMIZE_DIRS }
        cmd: 'echo "==> {{.ITEM}}" && kustomize build "{{.ITEM}}" >/dev/null'
    vars:
      KUSTOMIZE_DIRS: >-
        gitops-apps/platform/overlays/dev
        gitops-apps/platform/overlays/prod
        gitops-apps/observability/overlays/dev
        gitops-apps/observability/overlays/prod

  validate:scripts:
    desc: bash -n + shellcheck the shell scripts
    cmds:
      - bash -n install.sh prune.sh lib/common.sh
      - 'command -v shellcheck >/dev/null && shellcheck -x install.sh prune.sh lib/common.sh || echo "(shellcheck not installed; skipped)"'

  # Argo CD now lives on the floci-EKS clusters. These inspection tasks read the
  # EKS kubeconfig the app writes (task eks:kubeconfig ENV=<env>).
  k8s:status:
    desc: Show the management cluster + the EKS Argo CD application health (ENV=dev)
    cmds:
      - 'echo "=== kind clusters (management = Gitea) ===" && kind get clusters'
      - |
        KCFG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        [ -f "$KCFG" ] || { echo "no EKS kubeconfig — run (from the app) task eks:kubeconfig ENV={{.ENV}}"; exit 0; }
        echo "=== floci-eks-{{.ENV}} apps ==="
        KUBECONFIG="$KCFG" kubectl -n argocd get applications.argoproj.io

  k8s:pods:
    desc: List pods on the floci-EKS cluster (ENV=dev)
    cmds:
      - |
        KCFG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        [ -f "$KCFG" ] || { echo "no EKS kubeconfig — run (from the app) task eks:kubeconfig ENV={{.ENV}}"; exit 1; }
        KUBECONFIG="$KCFG" kubectl get pods -A

  k8s:apps:
    desc: Show Argo CD applications on the floci-EKS cluster (ENV=dev)
    cmds:
      - KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig" kubectl -n argocd get applications.argoproj.io

  k8s:sync:
    desc: Hard-refresh + sync every Argo app on the floci-EKS cluster (ENV=dev)
    cmds:
      - |
        export KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        for app in $(kubectl -n argocd get applications.argoproj.io -o name); do
          kubectl -n argocd annotate "$app" argocd.argoproj.io/refresh=hard --overwrite >/dev/null
          kubectl -n argocd patch "$app" --type merge -p '{"operation":{"sync":{}}}' >/dev/null
          echo "synced $app"
        done

  k8s:trivy:
    desc: 'Scan the floci-EKS cluster (ENV=dev) or an image (IMG=local/todo-app:dev) with Trivy'
    cmds:
      - |
        if [ -n "{{.IMG}}" ]; then
          trivy image "{{.IMG}}"
        else
          echo "Scanning floci-eks-{{.ENV}} (pass IMG=<image> to scan a single image instead)"
          KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig" trivy k8s --report summary --scanners misconfig,vuln
        fi

  argo:password:
    desc: 'Print the in-EKS Argo CD admin login (ENV=dev). User: admin.'
    cmds:
      - |
        KCFG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        [ -f "$KCFG" ] || { echo "no EKS kubeconfig — run (from the app) task eks:kubeconfig ENV={{.ENV}}"; exit 1; }
        pw=$(KUBECONFIG="$KCFG" kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)
        echo "floci-eks-{{.ENV}}: admin / ${pw:-<rotated — check argocd-initial-admin-secret>}   http://argo.{{.ENV}}.local"

  argo:repos:
    desc: Show the Gitea repositories the in-EKS Argo CD is linked to (ENV=dev)
    cmds:
      - KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig" kubectl -n argocd get secret -l argocd.argoproj.io/secret-type=repository

  # --- floci-EKS cluster bootstrap (PLATFORM-owned) ------------------------
  # The platform bootstraps the app's floci-EKS (k3s) cluster end-to-end:
  # MetalLB + ingress-nginx (network) + Argo CD (control plane) + the Argo
  # Applications. The APP repo owns only its deployable content — the Helm
  # chart, its Argo Application manifests, and its own Grafana dashboards — and
  # its CD pipeline calls eks:bootstrap here, passing APP_DIR (its checkout) so
  # we can apply its Application manifests. The app still creates the cluster
  # itself (Terragrunt).
  #
  # LB IPs sit OUTSIDE the kind MetalLB pools (mgmt .200-.209) to avoid L2
  # collisions: dev EKS = .230, prod EKS = .240.
  eks:bootstrap:
    desc: 'Full floci-EKS bootstrap (ENV=dev|prod): MetalLB + ingress-nginx + Argo CD + Applications. APP_DIR = app repo checkout (provides its Argo Application manifests).'
    vars:
      APP_PROJECT: '{{.APP_PROJECT | default "todo-app"}}'
      APP_DIR: '{{.APP_DIR | default ""}}'
      APP_REPO_NAME: '{{.APP_REPO_NAME | default "modular-monolithic-app"}}'
    cmds:
      # 1) kubeconfig for the target EKS cluster.
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}", APP_PROJECT: "{{.APP_PROJECT}}" }
      # 2) Cluster network: MetalLB + ingress-nginx + kind-net.
      - task: eks:bootstrap-net
        vars: { ENV: "{{.ENV}}", APP_PROJECT: "{{.APP_PROJECT}}" }
      # 3) GitOps control plane: Argo CD + AppProjects + observability.
      - task: eks:install-argo
        vars: { ENV: "{{.ENV}}" }
      # 4) Applications: app repo credential + the app's Argo Applications.
      - task: eks:register-app
        vars: { ENV: "{{.ENV}}", APP_PROJECT: "{{.APP_PROJECT}}", APP_DIR: "{{.APP_DIR}}", APP_REPO_NAME: "{{.APP_REPO_NAME}}" }

  eks:kubeconfig:
    desc: 'Write a kubeconfig for the floci-EKS cluster (ENV=dev|prod) to /tmp/floci-eks-<env>.kubeconfig'
    vars:
      APP_PROJECT: '{{.APP_PROJECT | default "todo-app"}}'
      K3S: "floci-eks-{{.APP_PROJECT}}-{{.ENV}}"
    cmds:
      - |
        set -euo pipefail
        OUT="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        PORT=$(docker inspect -f '{{`{{(index (index .NetworkSettings.Ports "6443/tcp") 0).HostPort}}`}}' "{{.K3S}}")
        docker exec "{{.K3S}}" cat /etc/rancher/k3s/k3s.yaml \
          | sed "s#https://127.0.0.1:6443#https://localhost:${PORT}#" > "$OUT"
        echo "wrote $OUT (server localhost:${PORT})"
        KUBECONFIG="$OUT" kubectl get nodes

  eks:bootstrap-net:
    desc: 'Install MetalLB (dedicated single-IP pool) + ingress-nginx into the floci-EKS cluster (ENV=dev|prod)'
    vars:
      APP_PROJECT: '{{.APP_PROJECT | default "todo-app"}}'
      K3S: "floci-eks-{{.APP_PROJECT}}-{{.ENV}}"
      EKS_LB_IP: '{{if eq .ENV "prod"}}172.18.255.240{{else}}172.18.255.230{{end}}'
      METALLB_VERSION: '{{.METALLB_VERSION | default "v0.14.8"}}'
      INGRESS_NGINX_REF: '{{.INGRESS_NGINX_REF | default "controller-v1.11.3"}}'
    preconditions:
      - sh: docker inspect {{.K3S}} >/dev/null 2>&1
        msg: "k3s container {{.K3S}} not found — run the app's `task terraform:apply ENV={{.ENV}}` (FLOCI=true) first."
    cmds:
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}", APP_PROJECT: "{{.APP_PROJECT}}" }
      - |
        set -euo pipefail
        export KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        # The k3s container must sit on the shared `kind` network so MetalLB can
        # L2-advertise {{.EKS_LB_IP}} where the host (and kind) can reach it.
        docker network connect kind "{{.K3S}}" 2>/dev/null || true
        # 1) MetalLB (floci k3s ships no servicelb, so no klipper conflict).
        kubectl apply -f "https://raw.githubusercontent.com/metallb/metallb/{{.METALLB_VERSION}}/config/manifests/metallb-native.yaml" >/dev/null
        kubectl -n metallb-system rollout status deploy/controller --timeout=180s
        kubectl -n metallb-system rollout status daemonset/speaker --timeout=180s
        # 2) Single-IP pool + L2 advertisement (declarative manifest, env IP
        #    rendered in; retry while the validating webhook comes up).
        for i in $(seq 1 10); do
          sed "s|__EKS_LB_IP__|{{.EKS_LB_IP}}|g" bootstrap/eks/metallb-pool.yaml \
            | kubectl apply -f - >/dev/null 2>&1 && break || sleep 6
        done
        # 3) ingress-nginx (cloud manifest -> a LoadBalancer svc MetalLB fills).
        kubectl apply -f "https://raw.githubusercontent.com/kubernetes/ingress-nginx/{{.INGRESS_NGINX_REF}}/deploy/static/provider/cloud/deploy.yaml" >/dev/null
        kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=240s
        kubectl -n ingress-nginx patch svc ingress-nginx-controller \
          -p '{"spec":{"loadBalancerIP":"{{.EKS_LB_IP}}"}}' >/dev/null 2>&1 || true
        echo "floci-eks-{{.ENV}} network ready — ingress LB IP {{.EKS_LB_IP}}"

  eks:register-app:
    desc: 'Register the app with the in-EKS Argo CD (ENV=dev|prod): repo credential + its Argo Applications from APP_DIR. Argo must already be installed (eks:install-argo).'
    vars:
      APP_PROJECT: '{{.APP_PROJECT | default "todo-app"}}'
      K3S: "floci-eks-{{.APP_PROJECT}}-{{.ENV}}"
      APP_DIR: '{{.APP_DIR | default ""}}'
      APP_REPO_NAME: '{{.APP_REPO_NAME | default "modular-monolithic-app"}}'
    preconditions:
      - sh: docker inspect {{.K3S}} >/dev/null 2>&1
        msg: "k3s container {{.K3S}} not found — run `task install` (the platform creates the floci-EKS clusters)."
    cmds:
      - task: eks:kubeconfig
        vars: { ENV: "{{.ENV}}", APP_PROJECT: "{{.APP_PROJECT}}" }
      - |
        set -euo pipefail
        # Platform-only bootstrap (task install) passes no APP_DIR — there is no
        # app to register yet, so skip. The app's CD passes APP_DIR=its checkout.
        if [ -z "{{.APP_DIR}}" ]; then
          echo "no APP_DIR — platform-only bootstrap, skipping app registration"
          exit 0
        fi
        [ -d "{{.APP_DIR}}/infra/k8s/gitops/applications" ] \
          || { echo "APP_DIR '{{.APP_DIR}}' has no infra/k8s/gitops/applications — wrong path?" >&2; exit 1; }
        export KUBECONFIG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        kubectl -n argocd get deploy argocd-server >/dev/null 2>&1 \
          || { echo "Argo CD not installed — eks:install-argo must run first" >&2; exit 1; }
        # Gitea repo credential so the in-EKS Argo can read the app repo.
        kubectl apply -f - <<EOF >/dev/null
        apiVersion: v1
        kind: Secret
        metadata:
          name: repo-{{.APP_REPO_NAME}}
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
        stringData:
          type: git
          name: {{.APP_REPO_NAME}}
          url: {{.GITEA_INCLUSTER_URL}}/{{.GITEA_ORG}}/{{.APP_REPO_NAME}}.git
          username: {{.GITEA_ADMIN_USER}}
          password: {{.GITEA_ADMIN_PASSWORD}}
        EOF
        # The app's Applications (deps wave 1, app wave 2) — in-cluster dest.
        kubectl apply \
          -f "{{.APP_DIR}}/infra/k8s/gitops/applications/dependencies-{{.ENV}}.yaml" \
          -f "{{.APP_DIR}}/infra/k8s/gitops/applications/todo-app-{{.ENV}}.yaml" >/dev/null
        echo "registered {{.APP_REPO_NAME}} Applications with the in-EKS Argo (ENV={{.ENV}})"

  # Installs Argo CD (the deployer) + the argo.<env>.local ingress + the
  # AppProjects (governance) + the observability stack INTO a floci-EKS cluster.
  # Called by eks:bootstrap (step 3); needs a kubeconfig for the target cluster.
  eks:install-argo:
    desc: 'Install Argo CD (GitOps control plane) into a floci-EKS cluster (ENV=dev|prod) + argo.<env>.local ingress + AppProjects'
    vars:
      ARGOCD_VERSION: '{{.ARGOCD_VERSION | default "v2.12.4"}}'
    cmds:
      - |
        set -euo pipefail
        KCFG="{{.KUBECONFIG}}"; [ -n "$KCFG" ] || KCFG="/tmp/floci-eks-{{.ENV}}.kubeconfig"
        [ -f "$KCFG" ] || { echo "kubeconfig $KCFG not found — the app pipeline writes it (task eks:kubeconfig)" >&2; exit 1; }
        export KUBECONFIG="$KCFG"
        # 1) Install Argo CD (idempotent).
        kubectl get ns argocd >/dev/null 2>&1 || kubectl create namespace argocd
        kubectl apply -n argocd -f "https://raw.githubusercontent.com/argoproj/argo-cd/{{.ARGOCD_VERSION}}/manifests/install.yaml" >/dev/null
        kubectl -n argocd rollout status deploy/argocd-server --timeout=180s
        kubectl -n argocd rollout status statefulset/argocd-application-controller --timeout=180s
        # 2) Serve the UI as plain HTTP behind the ingress (local only).
        kubectl -n argocd patch configmap argocd-cmd-params-cm --type merge -p '{"data":{"server.insecure":"true"}}' >/dev/null
        kubectl -n argocd rollout restart deploy/argocd-server >/dev/null
        kubectl -n argocd rollout status deploy/argocd-server --timeout=120s
        # 3) argo.<env>.local ingress + permissive AppProjects (declarative).
        sed "s|__ENV__|{{.ENV}}|g" bootstrap/eks/argocd-ingress.yaml | kubectl apply -f - >/dev/null
        kubectl apply -f bootstrap/eks/appprojects.yaml >/dev/null
        # 4) Gitea repo credential for the PLATFORM repo (gitops-apps), so this
        #    Argo can sync the observability stack — a Secret with creds, so it is
        #    rendered at runtime, never committed.
        kubectl apply -f - <<EOF >/dev/null
        apiVersion: v1
        kind: Secret
        metadata:
          name: repo-gitops-apps
          namespace: argocd
          labels: { argocd.argoproj.io/secret-type: repository }
        stringData:
          type: git
          name: gitops-apps
          url: {{.GITEA_INCLUSTER_URL}}/{{.GITEA_ORG}}/gitops-apps.git
          username: {{.GITEA_ADMIN_USER}}
          password: {{.GITEA_ADMIN_PASSWORD}}
        EOF
        # 5) Observability Application — Grafana/Prometheus/Loki/Tempo/OTel run IN
        #    this EKS cluster (grafana.<env>.local). Declarative manifest, env +
        #    repo URL rendered in.
        sed -e "s|__ENV__|{{.ENV}}|g" \
            -e "s|__GITEA_REPO_URL__|{{.GITEA_INCLUSTER_URL}}/{{.GITEA_ORG}}/gitops-apps.git|g" \
            bootstrap/eks/observability-app.yaml | kubectl apply -f - >/dev/null
        echo "installed Argo CD + observability into floci-eks (ENV={{.ENV}}) — argo.{{.ENV}}.local, grafana.{{.ENV}}.local"

  dns:test:
    desc: Curl the lab ingress hosts to confirm DNS + routing
    cmds:
      - for:
          - gitea.dev.local
          - argo.dev.local
          - grafana.dev.local
          - argo.prod.local
          - grafana.prod.local
        cmd: 'printf "%-22s -> " "{{.ITEM}}"; curl -s -o /dev/null -w "HTTP %{http_code}\n" "http://{{.ITEM}}" || echo "unreachable"'

  docs:serve:
    desc: Serve the project documentation locally (http://127.0.0.1:8080)
    cmds:
      - '{{.MKDOCS}} serve -a 127.0.0.1:8080'

  docs:build:
    desc: Build the static documentation site into site/
    cmds:
      - '{{.MKDOCS}} build'
