version: '3'

vars:
  CLUSTERS: management dev prod
  ARGO_CLUSTERS: dev prod
  ENV: '{{.ENV | default "dev"}}'
  MKDOCS: uvx --with mkdocs-material==9.7.6 --from mkdocs==1.6.1 mkdocs

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  tools:
    desc: Install the pinned CLI toolchain via mise (mise.toml)
    cmds:
      - mise install
      - mise reshim

  install:
    desc: Build the full lab (clusters, Gitea, per-cluster Argo CD, platform)
    cmds:
      - ./install.sh

  install:app:
    desc: Build the lab AND wire Argo to deploy the app (empty repo + Argo repo URL + Applications; DEPLOY_APP=true). Push content with the app's `task gitea:ship`.
    cmds:
      - DEPLOY_APP=true ./install.sh

  gitea:ship:
    desc: Re-push the platform GitOps repos (platform-config, gitops-apps) to Gitea so Argo reconciles your changes — no reinstall. Needs the lab running.
    cmds:
      # DEPLOY_APP=true pushes platform-config verbatim (keeps the app's Argo
      # Applications); SYNC_ONLY skips the cluster/Argo rebuild.
      - SYNC_ONLY=true DEPLOY_APP=true ./install.sh

  prune:
    desc: Tear down clusters, floci, DNS and Docker artifacts
    cmds:
      - ./prune.sh

  prune:all:
    desc: Tear down everything AND uninstall the mise-managed CLI tools
    cmds:
      - ./prune.sh --tools

  validate:
    desc: Render every overlay, parse YAML and lint the shell scripts
    cmds:
      - task: validate:kustomize
      - task: validate:scripts

  validate:kustomize:
    desc: kustomize build every overlay (must render cleanly)
    cmds:
      - for: { var: KUSTOMIZE_DIRS }
        cmd: 'echo "==> {{.ITEM}}" && kustomize build "{{.ITEM}}" >/dev/null'
    vars:
      KUSTOMIZE_DIRS: >-
        gitops-apps/platform/overlays/dev
        gitops-apps/platform/overlays/prod
        gitops-apps/observability/overlays/dev
        gitops-apps/observability/overlays/prod

  validate:scripts:
    desc: bash -n + shellcheck the shell scripts
    cmds:
      - bash -n install.sh prune.sh lib/common.sh
      - 'command -v shellcheck >/dev/null && shellcheck -x install.sh prune.sh lib/common.sh || echo "(shellcheck not installed; skipped)"'

  k8s:status:
    desc: Show clusters and Argo CD application health
    cmds:
      - 'echo "=== kind clusters ===" && kind get clusters'
      - for: { var: ARGO_CLUSTERS }
        cmd: 'echo "=== {{.ITEM}} apps ===" && kubectl --context kind-{{.ITEM}} -n argocd get applications.argoproj.io'

  k8s:pods:
    desc: List pods across all clusters (ENV=dev to scope to one cluster)
    cmds:
      - for: { var: CLUSTERS }
        cmd: 'echo "=== {{.ITEM}} ===" && kubectl --context kind-{{.ITEM}} get pods -A'

  k8s:apps:
    desc: Show Argo CD applications for ENV (default dev)
    cmds:
      - kubectl --context kind-{{.ENV}} -n argocd get applications.argoproj.io

  k8s:sync:
    desc: Hard-refresh + sync every Argo app in ENV (default dev)
    cmds:
      - |
        for app in $(kubectl --context kind-{{.ENV}} -n argocd get applications.argoproj.io -o name); do
          kubectl --context kind-{{.ENV}} -n argocd annotate "$app" argocd.argoproj.io/refresh=hard --overwrite >/dev/null
          kubectl --context kind-{{.ENV}} -n argocd patch "$app" --type merge -p '{"operation":{"sync":{}}}' >/dev/null
          echo "synced $app"
        done

  k8s:trivy:
    desc: 'Scan a cluster (ENV=dev) or an image (IMG=local/todo-app:dev) with Trivy'
    cmds:
      - |
        if [ -n "{{.IMG}}" ]; then
          trivy image "{{.IMG}}"
        else
          echo "Scanning kind-{{.ENV}} (pass IMG=<image> to scan a single image instead)"
          trivy k8s --context kind-{{.ENV}} --report summary --scanners misconfig,vuln
        fi

  argo:password:
    # Fixed lab creds (set on argocd-secret at install) — keep in sync with
    # LAB_PASSWORD in lib/common.sh.
    desc: 'Print the Argo CD admin login for each workload cluster (admin / adminlocal1)'
    cmds:
      - for: { var: ARGO_CLUSTERS }
        cmd: 'echo "kind-{{.ITEM}}: admin / adminlocal1"'

  argo:repos:
    desc: Show the Gitea repositories Argo CD is linked to (ENV=dev)
    cmds:
      - kubectl --context kind-{{.ENV}} -n argocd get secret -l argocd.argoproj.io/secret-type=repository

  dns:test:
    desc: Curl the lab ingress hosts to confirm DNS + routing
    cmds:
      - for:
          - gitea.dev.local
          - argo.dev.local
          - grafana.dev.local
          - argo.prod.local
          - grafana.prod.local
        cmd: 'printf "%-22s -> " "{{.ITEM}}"; curl -s -o /dev/null -w "HTTP %{http_code}\n" "http://{{.ITEM}}" || echo "unreachable"'

  docs:serve:
    desc: Serve the project documentation locally (http://127.0.0.1:8080)
    cmds:
      - '{{.MKDOCS}} serve -a 127.0.0.1:8080'

  docs:build:
    desc: Build the static documentation site into site/
    cmds:
      - '{{.MKDOCS}} build'
