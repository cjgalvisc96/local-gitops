apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
  annotations:
    # Discovered by the OpenTelemetry Collector's prometheus receiver.
    prometheus.io/scrape: "true"
    prometheus.io/port: "9898"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app.kubernetes.io/name: app
  ports:
    - name: http
      port: 9898
      targetPort: http
