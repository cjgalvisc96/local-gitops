apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

# Default config; each overlay overrides these via a merging configMapGenerator.
configMapGenerator:
  - name: app-config
    behavior: create
    literals:
      - PODINFO_UI_COLOR=#34577c
      - PODINFO_UI_MESSAGE=GitOps lab app
