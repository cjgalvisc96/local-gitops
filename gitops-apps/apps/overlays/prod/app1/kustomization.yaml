apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app1

resources:
  - ../../../base
  - ingress.yaml

commonLabels:
  gitops.local/env: prod
  gitops.local/app: app1

# Environment-specific configuration (the GitOps demo: change this, Argo syncs it).
configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - PODINFO_UI_COLOR=#c62828
      - PODINFO_UI_MESSAGE=app1 @ PROD
