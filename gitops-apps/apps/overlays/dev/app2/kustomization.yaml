apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app2

resources:
  - ../../../base
  - ingress.yaml

commonLabels:
  gitops.local/env: dev
  gitops.local/app: app2

# Environment-specific configuration (the GitOps demo: change this, Argo syncs it).
configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - PODINFO_UI_COLOR=#1565c0
      - PODINFO_UI_MESSAGE=app2 @ DEV
