apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: gitops-lab
        orgId: 1
        folder: GitOps Lab
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  podinfo.json: |
    {
      "title": "Podinfo / Applications",
      "uid": "gitops-podinfo",
      "schemaVersion": 39,
      "time": {"from": "now-15m", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP requests/sec by pod",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
  cluster.json: |
    {
      "title": "Cluster / Kubernetes",
      "uid": "gitops-cluster",
      "schemaVersion": 39,
      "time": {"from": "now-30m", "to": "now"},
      "panels": [
        {
          "type": "timeseries", "title": "CPU usage by pod (cores)",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{pod!=\"\",container!=\"\"}[5m])) by (pod)", "legendFormat": "{{pod}}"}]
        },
        {
          "type": "timeseries", "title": "Memory working set by pod (bytes)",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(container_memory_working_set_bytes{pod!=\"\",container!=\"\"}) by (pod)", "legendFormat": "{{pod}}"}]
        },
        {
          "type": "timeseries", "title": "Running pods by namespace",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(kube_pod_status_phase{phase=\"Running\"}) by (namespace)", "legendFormat": "{{namespace}}"}]
        },
        {
          "type": "timeseries", "title": "Container restarts by pod",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "sum(kube_pod_container_status_restarts_total) by (pod)", "legendFormat": "{{pod}}"}]
        }
      ]
    }
  logs.json: |
    {
      "title": "Logs (all pods)",
      "uid": "gitops-logs",
      "schemaVersion": 39,
      "time": {"from": "now-15m", "to": "now"},
      "panels": [
        {
          "type": "logs", "title": "Pod logs",
          "gridPos": {"h": 22, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {"showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending"},
          "targets": [{"datasource": {"type": "loki", "uid": "loki"}, "expr": "{k8s_namespace_name=~\".+\"}"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasource.yaml
                path: datasource.yaml
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
