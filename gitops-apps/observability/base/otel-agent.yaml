apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
data:
  config.yaml: |
    extensions:
      file_storage:
        directory: /var/lib/otelcol
    receivers:
      filelog:
        include: [/var/log/pods/*/*/*.log]
        start_at: beginning
        include_file_path: true
        storage: file_storage
        operators:
          - type: container
    processors:
      batch: {}
    exporters:
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
    service:
      extensions: [file_storage]
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        logs:
          receivers: [filelog]
          processors: [batch]
          exporters: [otlphttp/loki]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  labels:
    app.kubernetes.io/name: otel-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-agent
    spec:
      securityContext:
        runAsUser: 0
      tolerations:
        - operator: Exists
      containers:
        - name: otel-agent
          image: otel/opentelemetry-collector-contrib:0.115.1
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: self-metrics
              containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: storage
              mountPath: /var/lib/otelcol
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits:   { cpu: 300m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: otel-agent-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: storage
          emptyDir: {}
