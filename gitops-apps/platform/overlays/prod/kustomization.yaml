apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonLabels:
  gitops.local/env: prod

patches:
  - target:
      kind: ConfigMap
      name: platform-config
    patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: prod
  - target:
      kind: ExternalSecret
      name: app1-secrets
    patch: |
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: /gitops/prod/app1/greeting
