# App namespaces are owned by the apps themselves: each app's Argo Application
# sets CreateNamespace=true. The platform only owns its own namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    gitops.local/tier: observability
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-system
  labels:
    gitops.local/tier: platform
