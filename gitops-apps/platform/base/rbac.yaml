# Per-app RBAC is owned by each app's Helm chart (it ships its own Roles +
# ServiceAccounts). The platform only defines its own deploy identity and
# read-only observability access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: observability-readonly
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
