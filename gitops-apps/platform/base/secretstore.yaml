# AWS SSM Parameter Store access via External Secrets Operator, backed by floci.
# These resources depend on ESO's CRDs (installed by the external-secrets
# ApplicationSet); the sync-options below let Argo apply them before the CRDs
# are dry-run-checkable and self-heal once ESO is up.
---
apiVersion: v1
kind: Secret
metadata:
  name: floci-aws-creds
  namespace: platform-system
type: Opaque
stringData:
  # floci/localstack accept any non-empty credentials.
  access-key-id: test
  secret-access-key: test
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: floci-aws-creds
            namespace: platform-system
            key: access-key-id
          secretAccessKeySecretRef:
            name: floci-aws-creds
            namespace: platform-system
            key: secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app1-secrets
  namespace: app1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: app1-secrets
    creationPolicy: Owner
  data:
    - secretKey: greeting
      remoteRef:
        key: /gitops/app1/greeting
