# AWS SSM Parameter Store access via External Secrets Operator, backed by floci.
# These resources depend on ESO's CRDs (installed by the external-secrets
# ApplicationSet); the sync-options below let Argo apply them before the CRDs
# are dry-run-checkable and self-heal once ESO is up.
---
apiVersion: v1
kind: Secret
metadata:
  name: floci-aws-creds
  namespace: platform-system
type: Opaque
stringData:
  # floci/localstack accept any non-empty credentials.
  access-key-id: test
  secret-access-key: test
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: floci-aws-creds
            namespace: platform-system
            key: access-key-id
          secretAccessKeySecretRef:
            name: floci-aws-creds
            namespace: platform-system
            key: secret-access-key
# NOTE: the aws-ssm ClusterSecretStore above is the platform-provided store.
# Workloads (e.g. the todo-app Helm chart) bring their own ExternalSecret that
# references it, pulling from /gitops/<env>/<app>/* in floci's SSM.
